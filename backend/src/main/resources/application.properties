server.port=8080
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mcp_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
app.jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey123456}
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=14

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

app.storage.path=${APP_STORAGE_PATH:./storage}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-stacktrace=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

openai.api.key=${OPENAI_API_KEY:}
ai.service.mcp-url=${AI_SERVICE_MCP_URL:http://localhost:8081/mcp}
ai.service.token=${AI_SERVICE_TOKEN:dev-service-token}
