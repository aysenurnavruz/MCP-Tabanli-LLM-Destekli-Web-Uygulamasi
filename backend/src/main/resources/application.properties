server.port=8080
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mcp_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
app.jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey123456}
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=14

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

app.storage.path=${APP_STORAGE_PATH:./storage}
app.message-encryption-key=${MESSAGE_ENCRYPTION_KEY:dev-message-encryption-key-change-me}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-stacktrace=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

openai.api.key=${OPENAI_API_KEY:}

spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.name=backend-rag-mcp-client
spring.ai.mcp.client.version=1.0.0
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.request-timeout=60s
spring.ai.mcp.client.toolcallback.enabled=false
spring.ai.mcp.client.streamable-http.connections.ai-service.url=${AI_SERVICE_MCP_BASE_URL:http://localhost:8081}
spring.ai.mcp.client.streamable-http.connections.ai-service.endpoint=/mcp
